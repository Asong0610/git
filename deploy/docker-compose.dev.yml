services:
  mysql:
    image: mysql:8.0
    container_name: campus-device-mysql
    environment:
      MYSQL_ROOT_PASSWORD: campus_root
      MYSQL_DATABASE: campus_device
      MYSQL_USER: campus
      MYSQL_PASSWORD: campus
    ports:
      - "3306:3306"
    volumes:
      - campus_device_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "campus", "-pcampus"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: campus-device-redis
    ports:
      - "6379:6379"
    volumes:
      - campus_device_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  campus_device_mysql_data:
  campus_device_redis_data:
