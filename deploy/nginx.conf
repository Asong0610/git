# 根据 URI 动态设置移动端缓存策略
map $uri $mobile_cache_control {
    default                        "public, max-age=604800";
    ~^/mobile/index\.html$         "no-cache, must-revalidate";
    ~^/mobile/main\.dart\.js$      "no-cache, must-revalidate";
    ~^/mobile/flutter_bootstrap\.js$ "no-cache, must-revalidate";
    ~^/mobile/flutter_service_worker\.js$ "no-cache, must-revalidate";
    ~^/mobile/flutter\.js$         "no-cache, must-revalidate";
    ~^/mobile/version\.json$       "no-cache, must-revalidate";
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name asong0610.xyz;
    return 301 https://$host$request_uri;
}

# HTTPS 主服务
server {
    listen 443 ssl;
    server_name asong0610.xyz;

    # SSL 证书
    ssl_certificate /etc/nginx/ssl/asong0610.xyz_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/asong0610.xyz.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Vue Admin 静态资源
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # index.html 禁用缓存，确保每次获取最新版本
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Mobile 页面
    location ^~ /mobile/ {
        alias /usr/share/nginx/html/mobile/;
        try_files $uri $uri/ /mobile/index.html;
        index index.html;
        add_header Cache-Control $mobile_cache_control;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Swagger 文档
    location /docs {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # 缓存静态资源（排除 /mobile/ 路径，由 mobile location 处理）
    # 带哈希的 JS/CSS 文件名在内容变化时会自动更新，设置 7 天缓存
    location ~* ^(?!/mobile/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }


}
