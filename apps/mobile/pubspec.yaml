name: campus_device_mobile
description: 校园共享设备扫码借还 App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_screenutil: ^5.9.3
  
  # 状态管理
  flutter_riverpod: ^2.5.1
  
  # 网络请求
  dio: ^5.4.3+1
  
  # 路由
  go_router: ^14.2.0
  
  # 扫码
  mobile_scanner: ^5.0.1
  
  # 本地存储
  shared_preferences: ^2.2.3
  
  # 工具
  uuid: ^4.4.0
  intl: ^0.19.0
  
  # 本地化
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  # assets:
  #   - assets/images/
